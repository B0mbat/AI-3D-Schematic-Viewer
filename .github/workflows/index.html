<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>3D Schematic Viewer (Optimized)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nbt@0.8.1/nbt.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
        canvas { display: block; }
        #info { position: absolute; bottom: 10px; left: 10px; font-size: 12px; color: #888; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <input type="file" id="fileInput" accept=".schem">
        <div id="status" style="margin-top: 10px; font-size: 14px;">Warte auf Datei...</div>
    </div>
    <div id="info">Linksklick: Rotieren | Rechtsklick: Pan | Scrollen: Zoom</div>

            "minecraft:cyan_terracotta": "#565B5B",

            "minecraft:brown_terracotta": "#4D3324",
            "minecraft:green_terracotta": "#4C532A",
            "minecraft:red_terracotta": "#8F3D2F",
            "minecraft:black_terracotta": "#251610",

            "minecraft:glass": "#A8D5D5",

            "minecraft:light_gray_stained_glass": "#999999",
            "minecraft:cyan_stained_glass": "#4C7F99",
            "minecraft:purple_stained_glass": "#7F3FB2",
            "minecraft:blue_stained_glass": "#334CB2",
            "minecraft:brown_stained_glass": "#664C33",
            "minecraft:green_stained_glass": "#667F33",
            "minecraft:red_stained_glass": "#993333",
            "minecraft:black_stained_glass": "#191919",

            "minecraft:light_blue_wool": "#3AA0D0",
            "minecraft:white_wool": "#E9ECEC",
            "minecraft:black_wool": "#141519",
            "minecraft:red_wool": "#A02722",

            "minecraft:stone": "#7D7D7D",
            "minecraft:dirt": "#866043",
            "minecraft:grass_block": "#5E7C39",
            "minecraft:cobblestone": "#808080",
            "minecraft:bedrock": "#535353",
            "minecraft:sand": "#DBD3A0",
            "minecraft:gravel": "#837F7E",
            "minecraft:chiseled_polished_blackstone": "#2C282C",
            "minecraft:spruce_trapdoor": "#705434",
            "minecraft:yellow_wall_banner": "#F1AF15",
            "minecraft:yellow_banner": "#F1AF15",
            "minecraft:iron_block": "#E6E6E6",
            "minecraft:gold_block": "#FCE029",
            "minecraft:diamond_block": "#5DF6E3",
            "minecraft:emerald_block": "#50DA86"
        };

        const colorsCache = {};

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const light = new THREE.DirectionalLight(0xffffff, 3);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        camera.position.set(20, 20, 20);

        function getColor(name) {
            if (!name || name.includes('air')) return null;
            const base = name.split('[')[0];
            if (blockColorsHex[base]) return blockColorsHex[base];
            let hash = 0;
            for (let i = 0; i < base.length; i++) hash = base.charCodeAt(i) + ((hash << 5) - hash);
            return (hash & 0xFFFFFF);
        }

        function readVarInts(byteArray, count) {
            const result = new Int32Array(count);
            let offset = 0;
            for (let i = 0; i < count; i++) {
                let value = 0, pos = 0, b;
                do {
                    b = byteArray[offset++];
                    value |= (b & 0x7F) << pos;
                    pos += 7;
                } while (b & 0x80);
                result[i] = value;
            }
            return result;
        }

        async function loadSchematic(file) {
            document.getElementById('status').innerText = "Lade...";
            const buffer = await file.arrayBuffer();
            let data = new Uint8Array(buffer);
            try { data = pako.ungzip(data); } catch(e) {}

            nbt.parse(data, (err, nbtData) => {
                if (err) return alert(err);
                
                // Szene leeren
                while(scene.children.length > 2) scene.remove(scene.children[2]);

                const root = nbtData.value;
                const W = root.Width.value, H = root.Height.value, L = root.Length.value;
                const palette = root.Palette.value;
                const blocks = readVarInts(root.BlockData.value, W * H * L);

                const paletteMap = {};
                const instances = {}; // Gruppierung nach ID für Performance

                Object.keys(palette).forEach(name => {
                    const id = palette[name].value;
                    const color = getColor(name);
                    if (color !== null) {
                        paletteMap[id] = color;
                        instances[id] = [];
                    }
                });

                for (let y = 0; y < H; y++) {
                    for (let z = 0; z < L; z++) {
                        for (let x = 0; x < W; x++) {
                            const id = blocks[(y * L + z) * W + x];
                            if (instances[id]) instances[id].push({x, y, z});
                        }
                    }
                }

                const geometry = new THREE.BoxGeometry(1, 1, 1);
                Object.keys(instances).forEach(id => {
                    const coords = instances[id];
                    const mesh = new THREE.InstancedMesh(geometry, new THREE.MeshStandardMaterial({color: paletteMap[id]}), coords.length);
                    const dummy = new THREE.Object3D();
                    coords.forEach((c, i) => {
                        dummy.position.set(c.x, c.y, c.z);
                        dummy.updateMatrix();
                        mesh.setMatrixAt(i, dummy.matrix);
                    });
                    scene.add(mesh);
                });

                controls.target.set(W/2, H/2, L/2);
                camera.position.set(W*1.5, H*1.5, L*1.5);
                controls.update();
                document.getElementById('status').innerText = `Fertig: ${W}x${H}x${L}`;
            });
        }

        document.getElementById('fileInput').onchange = e => loadSchematic(e.target.files[0]);
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
